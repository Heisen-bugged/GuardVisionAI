name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: Lint & Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Linter
        run: pnpm run lint

      # We can't do a full next build here without env vars, but we can typecheck
      # - name: Typecheck
      #   run: pnpm tsc --noEmit

  deploy-production:
    name: Deploy to Production (Vercel & GCP)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      # 1. Setup Vercel Project (Connect Git & Env Vars)
      - name: Install Vercel CLI
        run: pnpm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Link Git Repository to Vercel
        run: vercel git connect github Heisen-bugged/GuardVisionAI --yes --token=${{ secrets.VERCEL_TOKEN }} || true

      - name: Add PocketBase URL to Vercel Environment
        run: |
          echo -n "http://130.61.153.164:8090" > pb_url.txt
          vercel env rm NEXT_PUBLIC_POCKETBASE_URL production -y --token=${{ secrets.VERCEL_TOKEN }} || true
          vercel env add NEXT_PUBLIC_POCKETBASE_URL production --token=${{ secrets.VERCEL_TOKEN }} < pb_url.txt
          vercel env rm POCKETBASE_URL production -y --token=${{ secrets.VERCEL_TOKEN }} || true
          vercel env add POCKETBASE_URL production --token=${{ secrets.VERCEL_TOKEN }} < pb_url.txt

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_POCKETBASE_URL: "http://130.61.153.164:8090"

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # 2. Deploy Cloud Functions to GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
        continue-on-error: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        continue-on-error: true

      - name: Deploy Process Asset Function
        run: |
          gcloud functions deploy process-asset \
            --gen2 \
            --runtime nodejs20 \
            --source ./functions/process-asset \
            --entry-point processAsset \
            --trigger-topic asset-uploaded-topic \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars POCKETBASE_URL=${{ secrets.POCKETBASE_URL }},POCKETBASE_ADMIN_EMAIL=${{ secrets.POCKETBASE_ADMIN_EMAIL }},POCKETBASE_ADMIN_PASSWORD=${{ secrets.POCKETBASE_ADMIN_PASSWORD }}
        continue-on-error: true

      - name: Deploy Video Results Function
        run: |
          gcloud functions deploy process-video-results \
            --gen2 \
            --runtime nodejs20 \
            --source ./functions/process-video-results \
            --entry-point processVideoResults \
            --trigger-topic video-processing-complete-topic \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars POCKETBASE_URL=${{ secrets.POCKETBASE_URL }},POCKETBASE_ADMIN_EMAIL=${{ secrets.POCKETBASE_ADMIN_EMAIL }},POCKETBASE_ADMIN_PASSWORD=${{ secrets.POCKETBASE_ADMIN_PASSWORD }}
        continue-on-error: true
